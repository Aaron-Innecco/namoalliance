<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <title>Council Discussion Board</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div id="topbar-nav">
      <img src="https://static.wikitide.net/namowiki/d/d0/NAMO_Flag.png">
      <a href="https://namoalliance.org/">Home</a>
      <a href="https://namoalliance.org/join">Join</a>
      <a href="https://namoalliance.org/members">Members</a>
      <a href="https://wiki.namoalliance.org/wiki/Main_Page">Wiki</a>
      <a href="https://namoalliance.org/discussion">Discussion</a>
      <a href="https://namoalliance.org/news">News</a>
      <a href="https://namoalliance.org/account">Account</a>
      <a href="https://namoalliance.org/contact-us">Contact us</a>
      <div id="user-display"></div>
      <img src="https://static.wikitide.net/namowiki/d/d0/NAMO_Flag.png">
  </div>
  <div class="main-content">
    <div id="root"></div>
  </div>
  <div id="bottombar-container">
    <div id="bottombar-nav">
      <a href='https://wiki.namoalliance.org/wiki/Nova_Associate_Micronational_Organisation'>NAMOwiki Page</a>
    </div>
  </div>

  <!-- DOMPurify -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const API_BASE = "https://api.namoalliance.org";

    function App() {
      const [authenticated, setAuthenticated] = React.useState(false);
      const [inputPassword, setInputPassword] = React.useState("");
      const [comments, setComments] = React.useState([]);
      const [name, setName] = React.useState("");
      const [message, setMessage] = React.useState("");
      const [replyName, setReplyName] = React.useState({});
      const [replyMessage, setReplyMessage] = React.useState({});

      const fetchComments = async () => {
        const response = await fetch(`${API_BASE}/api/council_discussion`);
        const data = await response.json();
        const commentList = Object.entries(data || {}).map(([key, value]) => ({
          _id: key,
          ...value
        }));
        setComments(commentList);
      };

      React.useEffect(() => {
        fetchComments();
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        const response = await fetch(`${API_BASE}/api/auth/check_council_password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: inputPassword }),
          credentials: 'include'
        });
        const result = await response.json();
        if (result.valid) {
          setAuthenticated(true);
        } else {
          alert("Incorrect password.");
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
      
        const username = localStorage.getItem("loggedInUser");
      
        if (!username) {
          alert("You need to log into your account to send a message.");
          return;
        }
      
        if (message) {
          const response = await fetch(`${API_BASE}/api/council_discussion`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: DOMPurify.sanitize(username), message: DOMPurify.sanitize(message), timestamp: Date.now() }),
            credentials: 'include'
          });
          if (response.ok) {
            setMessage("");
            fetchComments();
          } else {
            alert("Error posting comment.");
          }
        }
      };



      const handleReply = async (e, commentId) => {
        e.preventDefault();
      
        const username = localStorage.getItem("loggedInUser");
      
        if (!username) {
          alert("You need to log into your account to send a reply.");
          return;
        }

        const rMessage = replyMessage[commentId];

        if (rMessage) {
          const response = await fetch(`${API_BASE}/api/council_discussion/${commentId}/reply`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: DOMPurify.sanitize(username), message: DOMPurify.sanitize(rMessage), timestamp: Date.now() }),
            credentials: 'include'
          });
          if (response.ok) {
            setReplyMessage({ ...replyMessage, [commentId]: "" });
            fetchComments();
          } else {
            alert("Error posting reply.");
          }
        }
      };


      if (!authenticated) {
        return (
          <form onSubmit={handleLogin}>
            <h2>Enter Council Password to Access Council Discussion</h2>
            <input
              type="password"
              value={inputPassword}
              onChange={(e) => setInputPassword(e.target.value)}
              placeholder="Password"
              required
            />
            <button type="submit">Enter</button>
          </form>
        );
      }

      return (
        <div>
          <h2>Council Discussion Board</h2>
          <h3><strong>You need to log into an account to send a message.</strong></h3>
          <form onSubmit={handleSubmit}>
            <input
              type="text"
              value={localStorage.getItem("loggedInUser") || ""}
              readOnly
              placeholder="Your username"
            />
            <br />
            <textarea
              value={message}
              onChange={(e) => setMessage(e.target.value)}
              placeholder="Your comment"
              required
            /><br />
            <button type="submit">Post Comment</button>
          </form>

          <hr /><br />
          <h3>Comments</h3>

          {comments.map((c, i) => (
            <div key={i} className="comment">
              <strong>{DOMPurify.sanitize(c.name)}</strong><br />
              <p dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(c.message) }}></p><br />

              {c.replies &&
                Object.values(c.replies).map((r, j) => (
                  <div key={j} className="reply">
                    <strong>{DOMPurify.sanitize(r.name)}</strong><br />
                    <p dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(r.message) }}></p><br />
                  </div>
                ))}

              <form onSubmit={(e) => handleReply(e, c._id)}>
                <input
                  type="text"
                  value={localStorage.getItem("loggedInUser") || ""}
                  readOnly
                  placeholder="Your username"
                /><br />
                <br />
                <textarea
                  placeholder="Your reply"
                  value={replyMessage[c._id] || ""}
                                    onChange={(e) =>
                    setReplyMessage({ ...replyMessage, [c._id]: e.target.value })
                  }
                  required
                /><br />
                <button type="submit">Reply</button>
              </form>
              <br /><hr /><br />
            </div>
          ))}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script>
  // Display logged-in user in #user-display
  function showLoggedInUser() {
    const username = localStorage.getItem("loggedInUser");
    const display = document.getElementById("user-display");

    if (display && username) {
      display.innerHTML = `
        Logged in as <strong>${username}</strong>
        <button onclick="logoutUser()" style="margin-left:10px;">Logout</button>
      `;
    }
  }

  // Logout function
  function logoutUser() {
    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("sessionId");
    window.location.href = "https://namoalliance.org/"; // or reload current page
  }

  // Run on page load
  document.addEventListener("DOMContentLoaded", showLoggedInUser);
</script>
</body>
</html>
