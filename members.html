<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="styles/style.css"/>
  <title>Nova Associate Micronational Organisation</title>
</head>
<body>
  <div id="topbar-nav">
      <img src="https://static.wikitide.net/namowiki/d/d0/NAMO_Flag.png">
      <a href="https://namoalliance.org/">Home</a>
      <a href="https://namoalliance.org/join">Join</a>
      <a href="https://namoalliance.org/members">Members</a>
      <a href="https://wiki.namoalliance.org/wiki/Main_Page">Wiki</a>
      <a href="https://namoalliance.org/discussion">Discussion</a>
      <a href="https://namoalliance.org/news">News</a>
      <a href="https://namoalliance.org/account">Account</a>
      <a href="https://namoalliance.org/contact-us">Contact us</a>
      <div id="user-display"></div>
      <img src="https://static.wikitide.net/namowiki/d/d0/NAMO_Flag.png">
  </div>
  
  <h1>Members of the Nova Associate Micronational Organisation</h1>
  
  <!-- Container for members -->
  <div id="members"></div>
  
  <br><br>
  <div id="bottombar-container">
    <div id="bottombar-nav">
      <a href='https://wiki.namoalliance.org/wiki/Nova_Associate_Micronational_Organisation'>NAMOwiki Page</a>
    </div>
  </div>
  <script>
  // Display logged-in user in #user-display
  function showLoggedInUser() {
    const username = localStorage.getItem("loggedInUser");
    const display = document.getElementById("user-display");

    if (display && username) {
      display.innerHTML = `
        Logged in as <strong>${username}</strong>
        <button onclick="logoutUser()" style="margin-left:10px;">Logout</button>
      `;
    }
  }

  // Logout function
  function logoutUser() {
    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("sessionId");
    window.location.href = "https://namoalliance.org/"; // or reload current page
  }

  // Load members.json and render
  function loadMembers() {
    fetch("members.json")
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("members");
        container.innerHTML = ""; // clear existing content

        data.members.forEach(member => {
          const div = document.createElement("div");
          div.className = "member-card"; // optional CSS class
          div.innerHTML = `
            <h2>${member.name}</h2>
            <img src="${member.flag_url}" alt="Flag of ${member.name}" width="150">
            <p><a href="${member.wikipage}" target="_blank">Learn more</a></p>
          `;
          container.appendChild(div);
        });
      })
      .catch(error => {
        console.error("Error loading members.json:", error);
      });
  }

  // Run on page load
  document.addEventListener("DOMContentLoaded", () => {
    showLoggedInUser();
    loadMembers();
  });
  </script>
</body>
</html>
